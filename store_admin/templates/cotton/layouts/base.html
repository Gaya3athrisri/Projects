{% load static %}<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script>

    theme: {
      extend: {
        colors: {

        fontFamily: {
          display: ['Fraunces', 'serif'],

          mono: ['JetBrains Mono', 'monospace'],
        },
        boxShadow: {
          'soft': '0 1px 2px 0 rgba(44,44,42,0.04), 0 1px 3px 0 rgba(44,44,42,0.06)',
          'card': '0 2px 8px -2px rgba(44,44,42,0.08), 0 1px 2px -1px rgba(44,44,42,0.04)',
          'panel': '0 12px 32px -8px rgba(44,44,42,0.18)',

    }
  }

<link rel="stylesheet" href="{% static 'css/threadline.css' %}">

<body class="antialiased text-charcoal-700">
