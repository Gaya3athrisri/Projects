<!-- ============================================================ -->
<!-- SHELL: SIDEBAR -->
{# Usage: <c-shell.sidebar /> #}
<!-- ============================================================ -->
<aside :class="sidebarCollapsed ? 'w-[72px]' : 'w-64'" class="bg-charcoal-700 flex flex-col flex-shrink-0 transition-all duration-200 relative z-30">
  <div class="h-16 flex items-center px-4 flex-shrink-0" :class="sidebarCollapsed ? 'justify-center' : 'justify-between'">
    <div class="flex items-center gap-2.5 overflow-hidden">
      <div class="w-8 h-8 rounded-lg bg-rose-500 flex items-center justify-center font-display text-warmwhite text-base flex-shrink-0">T</div>
      <span x-show="!sidebarCollapsed" class="font-display text-warmwhite text-lg tracking-tight whitespace-nowrap">Threadline</span>
    </div>
  </div>

  <nav class="flex-1 overflow-y-auto sidebar-scroll px-3 py-3 space-y-0.5">
    <template x-for="item in navItems" :key="item.key">
      <div>
        <button @click="item.children ? toggleNavGroup(item.key) : navigate(item.key)"
          class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13.5px] font-medium transition group relative"
          :class="(isActiveNav(item) ? 'bg-rose-500 text-white' : 'text-charcoal-200 hover:bg-charcoal-600 hover:text-white')">
          <span class="text-base flex-shrink-0 leading-none" x-html="item.icon"></span>
          <span x-show="!sidebarCollapsed" class="whitespace-nowrap flex-1 text-left" x-text="item.label"></span>
          <svg x-show="!sidebarCollapsed && item.children" class="w-3.5 h-3.5 flex-shrink-0 transition-transform" :class="openGroups.includes(item.key) ? 'rotate-90' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
          <span x-show="sidebarCollapsed" class="pointer-events-none absolute left-full ml-2 px-2.5 py-1.5 rounded-lg bg-charcoal-800 text-white text-xs whitespace-nowrap opacity-0 group-hover:opacity-100 transition shadow-panel z-50" x-text="item.label"></span>
        </button>
        <template x-if="item.children && !sidebarCollapsed">
          <div x-show="openGroups.includes(item.key)" x-collapse class="ml-4 mt-0.5 mb-1 space-y-0.5 border-l border-charcoal-500 pl-3">
            <template x-for="child in item.children" :key="child.key">
              <button @click="navigate(child.key)" class="w-full text-left px-3 py-2 rounded-lg text-[13px] transition"
                :class="page === child.key ? 'text-rose-300 font-medium' : 'text-charcoal-300 hover:text-white'">
                <span x-text="child.label"></span>
              </button>
            </template>
          </div>
        </template>
      </div>
    </template>
  </nav>

  <div class="p-3 border-t border-charcoal-600 flex-shrink-0">
    <button @click="sidebarCollapsed = !sidebarCollapsed" class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg text-charcoal-300 hover:bg-charcoal-600 hover:text-white transition text-xs">
      <svg class="w-4 h-4 transition-transform" :class="sidebarCollapsed ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M11 19l-7-7 7-7M19 19l-7-7 7-7"/></svg>
      <span x-show="!sidebarCollapsed">Collapse</span>
    </button>
  </div>
</aside>
