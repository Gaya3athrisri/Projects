<!-- ============================================================ -->
<!-- AUTH: FORGOT PASSWORD -->
<!-- Usage: <c-auth.forgot /> -->
<!-- ============================================================ -->
<div x-show="!authed && authView === 'forgot'" class="min-h-screen flex items-center justify-center bg-warmwhite p-6">
  <div class="w-full max-w-sm">
    <div class="flex items-center gap-2.5 mb-10 justify-center">
      <div class="w-9 h-9 rounded-lg bg-rose-500 flex items-center justify-center font-display text-warmwhite text-lg">T</div>
      <span class="font-display text-charcoal-700 text-xl tracking-tight">Threadline</span>
    </div>

    <template x-if="!forgotSent">
      <div>
        <h1 class="font-display text-2xl text-charcoal-700">Reset your password</h1>
        <p class="text-charcoal-400 text-sm mt-2 mb-8 leading-relaxed">Enter the email on your account and we'll send a link to reset your password.</p>
        <form @submit.prevent="submitForgot()" novalidate>
          <label class="block text-sm font-medium text-charcoal-600 mb-1.5">Email</label>
          <input type="email" x-model="forgotEmail" @blur="validateForgot()"
            :class="forgotError ? 'border-rose-500 ring-1 ring-rose-200' : 'border-charcoal-200 focus:border-rose-400'"
            class="w-full rounded-xl border bg-white px-3.5 py-2.5 text-sm outline-none transition focus:ring-2 focus:ring-rose-100" placeholder="you@threadline.com" />
          <p x-show="forgotError" x-text="forgotError" class="mt-1.5 text-xs text-rose-600"></p>
          <button type="submit" class="w-full mt-6 rounded-xl bg-rose-500 py-2.5 text-sm font-semibold text-white shadow-soft hover:bg-rose-600 transition">Send reset link</button>
        </form>
      </div>
    </template>

    <template x-if="forgotSent">
      <div class="text-center">
        <div class="w-14 h-14 mx-auto rounded-full bg-softpink flex items-center justify-center mb-5">
          <svg class="w-6 h-6 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <h1 class="font-display text-2xl text-charcoal-700">Check your inbox</h1>
        <p class="text-charcoal-400 text-sm mt-2 leading-relaxed">We sent a reset link to <span class="font-medium text-charcoal-600" x-text="forgotEmail"></span>. It'll expire in 30 minutes.</p>
        <button @click="authView='reset'" class="w-full mt-6 rounded-xl bg-charcoal-700 py-2.5 text-sm font-semibold text-white hover:bg-charcoal-800 transition">Continue to reset (demo)</button>
      </div>
    </template>

    <button @click="authView = 'login'; forgotSent=false; forgotEmail=''; forgotError=''" class="flex items-center gap-1.5 text-sm text-charcoal-400 hover:text-charcoal-600 mt-8 mx-auto">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      Back to sign in
    </button>
  </div>
</div>
