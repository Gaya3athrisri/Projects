<!-- ============================================================ -->
<!-- UI: DEMO MODAL (Component library example) -->
{# Usage: <c-ui.demo-modal /> #}
<!-- Relies on: demoModalOpen, showToast() in adminApp() -->
<!-- ============================================================ -->
<div x-show="demoModalOpen" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none;">
  <div class="absolute inset-0 bg-charcoal-900/40 backdrop-blur-sm" @click="demoModalOpen = false"></div>
  <div x-show="demoModalOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
    class="relative bg-white rounded-2xl shadow-panel w-full max-w-md p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-display text-lg text-charcoal-700">Restock Linen Wrap Shirt</h3>
      <button @click="demoModalOpen=false" class="text-charcoal-300 hover:text-charcoal-500">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <p class="text-sm text-charcoal-400 mb-4">This is a standard centered modal with backdrop and transition — used here for confirmations and quick actions.</p>
    <label class="block text-sm font-medium text-charcoal-600 mb-1.5">Quantity to add</label>
    <input type="number" placeholder="50" class="w-full rounded-xl border border-charcoal-200 bg-warmwhite px-3.5 py-2.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition mb-5" />
    <div class="flex items-center justify-end gap-3">
      <button @click="demoModalOpen=false" class="px-4 py-2 rounded-xl text-sm font-semibold text-charcoal-500 hover:bg-charcoal-100 transition">Cancel</button>
      <button @click="demoModalOpen=false; showToast('success','Stock updated','50 units added to inventory.')" class="px-4 py-2 rounded-xl bg-rose-500 text-sm font-semibold text-white hover:bg-rose-600 transition">Confirm</button>
    </div>
  </div>
</div>
