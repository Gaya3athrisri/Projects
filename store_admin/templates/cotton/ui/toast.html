<!-- ============================================================ -->
<!-- UI: TOAST STACK (bottom-right) -->
{# Usage: <c-ui.toast /> #}
<!-- ============================================================ -->
<div class="fixed bottom-5 right-5 z-[100] flex flex-col gap-2.5 w-80" x-show="authed">
  <template x-for="t in toasts" :key="t.id">
    <div x-show="t.visible" x-transition:enter="transition ease-out duration-250" x-transition:enter-start="opacity-0 translate-x-4"
      x-transition:enter-end="opacity-100 translate-x-0" x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100 translate-x-0" x-transition:leave-end="opacity-0 translate-x-4"
      class="flex items-start gap-3 rounded-xl shadow-panel px-4 py-3 border"
      :class="{
        'bg-white border-emerald-200': t.type==='success',
        'bg-white border-rose-300': t.type==='error',
        'bg-white border-amber-200': t.type==='warning',
        'bg-white border-charcoal-200': t.type==='info'
      }">
      <div class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0"
        :class="{
          'bg-emerald-50 text-emerald-600': t.type==='success',
          'bg-rose-50 text-rose-600': t.type==='error',
          'bg-amber-50 text-amber-600': t.type==='warning',
          'bg-charcoal-50 text-charcoal-500': t.type==='info'
        }">
        <svg x-show="t.type==='success'" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
        <svg x-show="t.type==='error'" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <svg x-show="t.type==='warning'" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 9v4m0 4h.01M10.3 3.86L1.8 18a1.5 1.5 0 001.3 2.25h17.8a1.5 1.5 0 001.3-2.25L13.7 3.86a1.5 1.5 0 00-2.6 0z"/></svg>
        <svg x-show="t.type==='info'" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-charcoal-700" x-text="t.title"></p>
        <p class="text-xs text-charcoal-400 mt-0.5" x-text="t.message"></p>
      </div>
      <button @click="dismissToast(t.id)" class="text-charcoal-300 hover:text-charcoal-500 flex-shrink-0">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </template>
</div>
