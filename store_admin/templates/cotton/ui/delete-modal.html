<!-- ============================================================ -->
<!-- UI: DELETE CONFIRMATION MODAL -->
<!-- Usage: <c-ui.delete-modal /> -->
<!-- Relies on: deleteModalOpen, productToDelete, deleteProduct() in adminApp() -->
<!-- ============================================================ -->
<div x-show="deleteModalOpen" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none;">
  <div class="absolute inset-0 bg-charcoal-900/40 backdrop-blur-sm" @click="deleteModalOpen = false"></div>
  <div x-show="deleteModalOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
    class="relative bg-white rounded-2xl shadow-panel w-full max-w-sm p-6">
    <div class="w-12 h-12 rounded-full bg-rose-50 flex items-center justify-center mb-4">
      <svg class="w-5 h-5 text-rose-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6"/></svg>
    </div>
    <h3 class="font-display text-lg text-charcoal-700">Delete this product?</h3>
    <p class="text-sm text-charcoal-400 mt-1.5 mb-5">"<span class="font-medium text-charcoal-600" x-text="productToDelete?.name"></span>" will be removed permanently. This can't be undone.</p>
    <div class="flex items-center justify-end gap-3">
      <button @click="deleteModalOpen=false" class="px-4 py-2 rounded-xl text-sm font-semibold text-charcoal-500 hover:bg-charcoal-100 transition">Cancel</button>
      <button @click="deleteProduct()" class="px-4 py-2 rounded-xl bg-rose-600 text-sm font-semibold text-white hover:bg-rose-700 transition">Delete</button>
    </div>
  </div>
</div>
