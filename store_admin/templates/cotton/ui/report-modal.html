<!-- ============================================================ -->
<!-- UI: REPORT DOWNLOAD MODAL -->
{# Usage: <c-ui.report-modal /> #}
<!-- Relies on: reportModalOpen, report, downloadReport() in adminApp() -->
<!-- ============================================================ -->
<div x-show="reportModalOpen" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display:none;">
  <div class="absolute inset-0 bg-charcoal-900/40 backdrop-blur-sm" @click="reportModalOpen = false"></div>
  <div x-show="reportModalOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
    class="relative bg-white rounded-2xl shadow-panel w-full max-w-sm p-6">
    <div class="w-12 h-12 rounded-full bg-softpink flex items-center justify-center mb-4">
      <svg class="w-5 h-5 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    </div>
    <h3 class="font-display text-lg text-charcoal-700">Download report</h3>
    <p class="text-sm text-charcoal-400 mt-1.5 mb-5">Choose a format for your <span class="font-medium text-charcoal-600" x-text="report.type.toLowerCase()"></span>.</p>
    <div class="grid grid-cols-2 gap-3 mb-5">
      <button @click="report.format='pdf'" class="rounded-xl border-2 px-4 py-3 text-sm font-medium transition flex items-center gap-2" :class="report.format==='pdf' ? 'border-rose-500 bg-softpink text-rose-700' : 'border-charcoal-200 text-charcoal-500'">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
        PDF
      </button>
      <button @click="report.format='csv'" class="rounded-xl border-2 px-4 py-3 text-sm font-medium transition flex items-center gap-2" :class="report.format==='csv' ? 'border-rose-500 bg-softpink text-rose-700' : 'border-charcoal-200 text-charcoal-500'">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M8 16h8M8 8h8"/></svg>
        CSV
      </button>
    </div>
    <div class="flex items-center justify-end gap-3">
      <button @click="reportModalOpen=false" class="px-4 py-2 rounded-xl text-sm font-semibold text-charcoal-500 hover:bg-charcoal-100 transition">Cancel</button>
      <button @click="downloadReport()" class="px-4 py-2 rounded-xl bg-rose-500 text-sm font-semibold text-white hover:bg-rose-600 transition">Download</button>
    </div>
  </div>
</div>
