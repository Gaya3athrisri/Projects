<!-- ============================================================ -->
<!-- PAGE: NOTIFICATIONS -->
{# Usage: <c-pages.notifications /> #}
<!-- ============================================================ -->
<div x-show="page === 'notifications'" class="p-6 max-w-2xl">
  <div class="bg-white rounded-xl shadow-card border border-charcoal-100 divide-y divide-charcoal-50">
    <template x-for="n in notifications" :key="n.id">
      <div class="px-5 py-4 flex gap-3.5 hover:bg-warmwhite/60 transition">
        <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" :class="n.type === 'order' ? 'bg-softpink text-rose-500' : n.type === 'stock' ? 'bg-amber-50 text-amber-500' : 'bg-charcoal-50 text-charcoal-400'">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
        </div>
        <div class="flex-1">
          <p class="text-sm text-charcoal-700" x-text="n.text"></p>
          <p class="text-xs text-charcoal-300 mt-1" x-text="n.time"></p>
        </div>
      </div>
    </template>
  </div>
</div>
