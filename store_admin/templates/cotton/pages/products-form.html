<!-- ============================================================ -->
<!-- PAGE: ADD / EDIT PRODUCT -->
<!-- Usage: <c-pages.products-form /> -->
<!-- ============================================================ -->
<div x-show="page === 'products-add' || page === 'products-edit'" class="p-6 max-w-4xl">
  <div class="flex items-center gap-3 mb-5">
    <button @click="navigate('products-list')" class="w-9 h-9 rounded-lg border border-charcoal-200 flex items-center justify-center text-charcoal-500 hover:bg-charcoal-50 transition">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h2 class="font-display text-xl text-charcoal-700" x-text="page === 'products-add' ? 'Add a new product' : 'Edit ' + productForm.name"></h2>
  </div>

  <form @submit.prevent="saveProduct()" novalidate class="space-y-5">
    <!-- Basic info -->
    <div class="bg-white rounded-xl shadow-card border border-charcoal-100 p-5">
      <h3 class="text-sm font-semibold text-charcoal-600 mb-4">Basic information</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="sm:col-span-2">
          <label class="block text-sm font-medium text-charcoal-600 mb-1.5">Product name</label>
          <input type="text" x-model="productForm.name" @blur="validateProductField('name')"
            :class="productForm.errors.name ? 'border-rose-500 ring-1 ring-rose-200' : 'border-charcoal-200 focus:border-rose-400'"
            class="w-full rounded-xl border bg-warmwhite px-3.5 py-2.5 text-sm outline-none transition focus:ring-2 focus:ring-rose-100" placeholder="e.g. Linen Wrap Shirt" />
          <p x-show="productForm.errors.name" x-text="productForm.errors.name" class="mt-1.5 text-xs text-rose-600"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-charcoal-600 mb-1.5">SKU</label>
          <input type="text" x-model="productForm.sku" @blur="validateProductField('sku')"
            :class="productForm.errors.sku ? 'border-rose-500 ring-1 ring-rose-200' : 'border-charcoal-200 focus:border-rose-400'"
            class="w-full rounded-xl border bg-warmwhite px-3.5 py-2.5 text-sm font-mono outline-none transition focus:ring-2 focus:ring-rose-100" placeholder="TL-SHRT-001" />
          <p x-show="productForm.errors.sku" x-text="productForm.errors.sku" class="mt-1.5 text-xs text-rose-600"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-charcoal-600 mb-1.5">Category</label>
          <select x-model="productForm.category" class="w-full rounded-xl border border-charcoal-200 bg-warmwhite px-3.5 py-2.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition">
            <option value="">Select category</option>
            <template x-for="c in categories" :key="c"><option :value="c" x-text="c"></option></template>
          </select>
        </div>
      </div>
    </div>

    <!-- Variants -->
    <div class="bg-white rounded-xl shadow-card border border-charcoal-100 p-5">
      <h3 class="text-sm font-semibold text-charcoal-600 mb-4">Variants</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-charcoal-600 mb-2">Size variants</label>
          <div class="flex flex-wrap gap-2">
            <template x-for="sz in ['XS','S','M','L','XL','XXL']" :key="sz">
              <button type="button" @click="toggleArrayItem(productForm.sizes, sz)"
                class="px-3.5 py-1.5 rounded-lg text-sm font-medium border transition"
                :class="productForm.sizes.includes(sz) ? 'bg-rose-500 border-rose-500 text-white' : 'border-charcoal-200 text-charcoal-500 hover:border-rose-300'"
                x-text="sz"></button>
            </template>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-charcoal-600 mb-2">Color variants</label>
          <div class="flex flex-wrap gap-2.5">
            <template x-for="c in colorOptions" :key="c.name">
              <button type="button" @click="toggleArrayItem(productForm.colors, c.name)" class="relative w-8 h-8 rounded-full border-2 transition"
                :class="productForm.colors.includes(c.name) ? 'border-rose-500' : 'border-transparent'"
                :style="'background-color:' + c.hex" :title="c.name">
                <svg x-show="productForm.colors.includes(c.name)" class="w-3.5 h-3.5 absolute inset-0 m-auto" :class="c.light ? 'text-charcoal-700' : 'text-white'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
              </button>
            </template>
          </div>
        </div>
      </div>
    </div>

    <!-- Pricing & stock -->
    <div class="bg-white rounded-xl shadow-card border border-charcoal-100 p-5">
      <h3 class="text-sm font-semibold text-charcoal-600 mb-4">Pricing &amp; stock</h3>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-charcoal-600 mb-1.5">Price (₹)</label>
          <input type="number" x-model.number="productForm.price" @blur="validateProductField('price')"
            :class="productForm.errors.price ? 'border-rose-500 ring-1 ring-rose-200' : 'border-charcoal-200 focus:border-rose-400'"
            class="w-full rounded-xl border bg-warmwhite px-3.5 py-2.5 text-sm font-mono outline-none transition focus:ring-2 focus:ring-rose-100" placeholder="1499" />
          <p x-show="productForm.errors.price" x-text="productForm.errors.price" class="mt-1.5 text-xs text-rose-600"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-charcoal-600 mb-1.5">Stock quantity</label>
          <input type="number" x-model.number="productForm.stock" @blur="validateProductField('stock')"
            :class="productForm.errors.stock ? 'border-rose-500 ring-1 ring-rose-200' : 'border-charcoal-200 focus:border-rose-400'"
            class="w-full rounded-xl border bg-warmwhite px-3.5 py-2.5 text-sm font-mono outline-none transition focus:ring-2 focus:ring-rose-100" placeholder="120" />
          <p x-show="productForm.errors.stock" x-text="productForm.errors.stock" class="mt-1.5 text-xs text-rose-600"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-charcoal-600 mb-1.5">Status</label>
          <select x-model="productForm.status" class="w-full rounded-xl border border-charcoal-200 bg-warmwhite px-3.5 py-2.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition">
            <option>Active</option>
            <option>Draft</option>
            <option>Archived</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Images -->
    <div class="bg-white rounded-xl shadow-card border border-charcoal-100 p-5">
      <h3 class="text-sm font-semibold text-charcoal-600 mb-4">Product images</h3>
      <div class="flex flex-wrap gap-3">
        <template x-for="(img, idx) in productForm.images" :key="idx">
          <div class="w-20 h-20 rounded-xl bg-softpink flex items-center justify-center text-2xl relative group">
            <span x-text="img"></span>
            <button type="button" @click="productForm.images.splice(idx,1)" class="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-charcoal-700 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </template>
        <button type="button" @click="productForm.images.push('🧵')" class="w-20 h-20 rounded-xl border-2 border-dashed border-charcoal-200 flex flex-col items-center justify-center text-charcoal-300 hover:border-rose-300 hover:text-rose-400 transition">
          <svg class="w-5 h-5 mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          <span class="text-[10px]">Upload</span>
        </button>
      </div>
    </div>

    <div class="flex items-center justify-end gap-3">
      <button type="button" @click="navigate('products-list')" class="px-4 py-2.5 rounded-xl text-sm font-semibold text-charcoal-500 hover:bg-charcoal-100 transition">Cancel</button>
      <button type="submit" class="px-5 py-2.5 rounded-xl bg-rose-500 text-sm font-semibold text-white shadow-soft hover:bg-rose-600 transition" x-text="page === 'products-add' ? 'Add product' : 'Save changes'"></button>
    </div>
  </form>
</div>
