<!-- ============================================================ -->
<!-- PAGE: ORDERS - UNDISPATCHED -->
<!-- Usage: <c-pages.orders-undispatched /> -->
<!-- ============================================================ -->
<div x-show="page === 'orders-undispatched'" class="p-6">
  <div class="bg-white rounded-xl shadow-card border border-charcoal-100">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 px-5 py-4 border-b border-charcoal-100">
      <div class="flex items-center gap-2 flex-wrap">
        <template x-for="f in ['All','Pending','Processing']" :key="f">
          <button @click="orderFilter = f" class="px-3.5 py-1.5 rounded-lg text-sm font-medium transition" :class="orderFilter===f ? 'bg-charcoal-700 text-white' : 'text-charcoal-500 hover:bg-charcoal-50'" x-text="f"></button>
        </template>
      </div>
      <div class="relative w-full sm:w-64">
        <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-charcoal-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" x-model="orderSearch" placeholder="Search order or customer..." class="w-full rounded-xl border border-charcoal-200 bg-warmwhite pl-9 pr-3 py-2 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition" />
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-left text-xs text-charcoal-400 uppercase tracking-wide border-b border-charcoal-100">
            <th class="px-5 py-3 font-medium">Order</th>
            <th class="px-5 py-3 font-medium">Customer</th>
            <th class="px-5 py-3 font-medium">Placed</th>
            <th class="px-5 py-3 font-medium">Amount</th>
            <th class="px-5 py-3 font-medium">Status</th>
            <th class="px-5 py-3 font-medium text-right">Action</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="o in filteredUndispatched" :key="o.id">
            <tr class="border-b border-charcoal-50 hover:bg-warmwhite/60 transition">
              <td class="px-5 py-3.5 font-mono text-charcoal-500" x-text="o.id"></td>
              <td class="px-5 py-3.5 text-charcoal-700 font-medium" x-text="o.customer"></td>
              <td class="px-5 py-3.5 text-charcoal-400" x-text="o.date"></td>
              <td class="px-5 py-3.5 font-mono text-charcoal-700" x-text="'₹' + o.amount.toLocaleString('en-IN')"></td>
              <td class="px-5 py-3.5"><span class="badge" :class="statusBadgeClass(o.status)" x-text="o.status"></span></td>
              <td class="px-5 py-3.5 text-right">
                <button @click="markDispatched(o)" class="text-xs font-semibold text-rose-600 hover:text-rose-700 px-3 py-1.5 rounded-lg hover:bg-softpink transition">Mark dispatched</button>
              </td>
            </tr>
          </template>
          <tr x-show="filteredUndispatched.length === 0">
            <td colspan="6" class="px-5 py-12 text-center">
              <p class="text-charcoal-400 text-sm">Nothing waiting here — every order is dispatched or filtered out.</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
