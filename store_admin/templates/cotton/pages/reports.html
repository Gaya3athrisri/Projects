<!-- ============================================================ -->
<!-- PAGE: REPORTS -->
{# Usage: <c-pages.reports /> #}
<!-- Note: pair with <c-ui.report-modal /> in the parent template -->
<!-- ============================================================ -->
<div x-show="page === 'reports'" class="p-6 space-y-5">
  <div class="bg-white rounded-xl shadow-card border border-charcoal-100 p-5">
    <h3 class="font-display text-lg text-charcoal-700 mb-4">Generate a report</h3>
    <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 items-end">
      <div>
        <label class="block text-sm font-medium text-charcoal-600 mb-1.5">From</label>
        <input type="date" x-model="report.from" class="w-full rounded-xl border border-charcoal-200 bg-warmwhite px-3.5 py-2.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-charcoal-600 mb-1.5">To</label>
        <input type="date" x-model="report.to" class="w-full rounded-xl border border-charcoal-200 bg-warmwhite px-3.5 py-2.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-charcoal-600 mb-1.5">Report type</label>
        <select x-model="report.type" class="w-full rounded-xl border border-charcoal-200 bg-warmwhite px-3.5 py-2.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition">
          <option>Sales summary</option>
          <option>Inventory snapshot</option>
          <option>Dispatch log</option>
        </select>
      </div>
      <button @click="reportModalOpen = true" class="rounded-xl bg-rose-500 px-4 py-2.5 text-sm font-semibold text-white shadow-soft hover:bg-rose-600 transition">Download report</button>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    <div class="bg-white rounded-xl shadow-card border border-charcoal-100 p-5">
      <span class="text-xs font-medium text-charcoal-400 uppercase tracking-wide">Revenue in range</span>
      <p class="font-display text-2xl text-charcoal-700 mt-2">₹3,18,420</p>
    </div>
    <div class="bg-white rounded-xl shadow-card border border-charcoal-100 p-5">
      <span class="text-xs font-medium text-charcoal-400 uppercase tracking-wide">Orders in range</span>
      <p class="font-display text-2xl text-charcoal-700 mt-2">412</p>
    </div>
    <div class="bg-white rounded-xl shadow-card border border-charcoal-100 p-5">
      <span class="text-xs font-medium text-charcoal-400 uppercase tracking-wide">Avg. order value</span>
      <p class="font-display text-2xl text-charcoal-700 mt-2">₹773</p>
    </div>
  </div>
</div>
