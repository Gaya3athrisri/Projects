<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Threadline — Clothing Business Admin{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/threadline.css' %}">
  <script src="{% static 'js/tailwind.config.js' %}"></script>

  {% block extra_head %}{% endblock %}
</head>
<body class="antialiased text-charcoal-700">
  {% block body %}{% endblock %}

  {% block extra_scripts %}{% endblock %}
</body>
</html>
